name: Android Unit Test Workflow

on:
  push:
    branches:
      - main 
  
jobs:
  test-backend:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Run Backend Engine Test
      run: ./gradlew :composeApp:testDebugUnitTest --tests "*ComposeAppAndroidUnitTest*"
